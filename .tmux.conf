# Keybinds

unbind C-b
set -g prefix C-space
bind C-space send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf


# Function

set -g default-terminal "tmux-256color"
set -g terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -g base-index 1
set -g pane-base-index 1
set -g mouse on


# Visual

# set -g mode-style 'fg=white bold'
# set -g mode-style 'fg=black, bg=white'
set -g mode-style 'reverse'

set -g pane-border-style 'fg=#7f7f7f'
set -g pane-active-border-style 'fg=white'

set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=white'
set -g status-left ''

set -g status-right-style 'fg=white'
set -g status-right ''

set -g window-status-current-style 'fg=white'
set -g window-status-current-format ' #I #W #F '

set -g window-status-style 'fg=#7f7f7f'
set -g window-status-format ' #I #W #F '

set -g window-status-bell-style 'fg=red bold'
set -g message-style 'fg=red bold'
